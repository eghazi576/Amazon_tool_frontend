<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Search Console ownership -->
    <meta name="google-site-verification" content="Rn3DcZfDbyb3chXyg-Jyk4Ar0obKlQCRqKyDGfVw1D0" />

    <!-- Primary SEO -->
    <title>WholesaleOS | AI Wholesale Analyst for Amazon Sellers</title>
    <meta name="description" content="Research Amazon products, score wholesale brands, and get a buy or no-buy verdict in seconds. Live Keepa data, profit math, and IP checks in one tool." />
    <meta name="author" content="WholesaleOS" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#7c3aed" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.thewholesaleos.com/" />

    <!-- Fonts: preload + onload so they never block the first paint. display=swap. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    </noscript>

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://www.thewholesaleos.com/" />
    <meta property="og:site_name"   content="WholesaleOS" />
    <meta property="og:title"       content="WholesaleOS | AI Wholesale Analyst for Amazon Sellers" />
    <meta property="og:description" content="Paste an Amazon ASIN and get live price history, BSR trends, profit margins, and a buy/no-buy verdict in seconds. Built for FBA wholesale sellers." />
    <meta property="og:image"       content="https://www.thewholesaleos.com/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type"   content="image/png" />
    <meta property="og:image:alt"    content="WholesaleOS — the AI-powered wholesale analyst for Amazon sellers" />

    <!-- Twitter / X. No twitter:site: the @wholesaleoscom handle does not exist. -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="WholesaleOS | AI Wholesale Analyst for Amazon Sellers" />
    <meta name="twitter:description" content="Paste an Amazon ASIN and get live price history, BSR trends, profit margins, and a buy/no-buy verdict in seconds." />
    <meta name="twitter:image"       content="https://www.thewholesaleos.com/og-image.png" />

    <!-- JSON-LD: Organization (sitewide). SoftwareApplication is homepage-scoped, emitted by <Seo>. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "WholesaleOS",
      "legalName": "Mentify LLC",
      "url": "https://www.thewholesaleos.com",
      "logo": "https://www.thewholesaleos.com/logo.png",
      "description": "Amazon FBA product and brand research platform for wholesale and online arbitrage sellers",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "1209 Mountain Road Pl NE, Ste 5054",
        "addressLocality": "Albuquerque",
        "addressRegion": "NM",
        "postalCode": "87110",
        "addressCountry": "US"
      },
      "telephone": "+1-505-378-4031",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "mentifyllc@gmail.com",
        "telephone": "+1-505-378-4031",
        "contactType": "customer support",
        "availableLanguage": "English"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>WholesaleOS | AI Wholesale Analyst for Amazon Sellers</title>
    <meta name="description" content="Research Amazon products, score wholesale brands, and get a buy or no-buy verdict in seconds. Live Keepa data, profit math, and IP checks in one tool." />
    <meta name="author" content="WholesaleOS" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#7c3aed" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.thewholesaleos.com/" />

    <!--
      Fonts, loaded without blocking the first paint.

      The pages are prerendered, so the HTML paints as soon as it arrives. A
      plain <link rel="stylesheet"> to fonts.googleapis.com held that paint
      hostage to a DNS lookup, a TLS handshake and a round trip to a third party.

      rel="preload" fetches at high priority without blocking; onload promotes it
      to a stylesheet. The URL already carries display=swap, so text renders in
      the fallback face and swaps when Inter arrives -- the same swap as before,
      just no longer waiting for it to start.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    </noscript>

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://www.thewholesaleos.com/" />
    <meta property="og:site_name"   content="WholesaleOS" />
    <meta property="og:title"       content="WholesaleOS | AI Wholesale Analyst for Amazon Sellers" />
    <meta property="og:description" content="Paste an Amazon ASIN and get live price history, BSR trends, profit margins, and a buy/no-buy verdict in seconds. Built for FBA wholesale sellers." />
    <meta property="og:image"       content="https://www.thewholesaleos.com/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"    content="WholesaleOS — Amazon FBA Product Research Tool" />

    <!-- Twitter / X -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@wholesaleoscom" />
    <meta name="twitter:title"       content="WholesaleOS | AI Wholesale Analyst for Amazon Sellers" />
    <meta name="twitter:description" content="Paste an Amazon ASIN and get live price history, BSR trends, profit margins, and a buy/no-buy verdict in seconds." />
    <meta name="twitter:image"       content="https://www.thewholesaleos.com/og-image.png" />

    <!--
      JSON-LD: Organization (sitewide).
      SoftwareApplication is homepage-scoped and is emitted by <Seo> in
      src/pages/Index.tsx; the prerenderer bakes it into dist/index.html.
      Note: this node carries no data-seo-jsonld attribute, so <Seo> leaves it alone.
    -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "WholesaleOS",
      "url": "https://www.thewholesaleos.com",
      "logo": "https://www.thewholesaleos.com/logo.png",
      "description": "Amazon FBA product and brand research platform for wholesale and online arbitrage sellers",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "support@wholesaleos.com",
        "contactType": "customer support"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

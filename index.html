<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Aurix | Amazon FBA Product Research Tool for Wholesale Sellers</title>
    <meta name="description" content="Aurix analyzes any Amazon ASIN in seconds. Get live price history, BSR trends, FBA seller count, profit margins, and a clear buy/no-buy verdict. Built for wholesale FBA and online arbitrage sellers." />
    <meta name="keywords" content="amazon fba product research, amazon wholesale tool, fba product finder, keepa alternative, amazon bsr tool, online arbitrage software, brand intelligence amazon, fba profit calculator" />
    <meta name="author" content="Aurix" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#7c3aed" />

    <!-- Canonical (update once you have a domain) -->
    <link rel="canonical" href="https://aurix.app/" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://aurix.app/" />
    <meta property="og:site_name"   content="Aurix" />
    <meta property="og:title"       content="Aurix | Amazon FBA Product Research Tool" />
    <meta property="og:description" content="Paste an Amazon ASIN and get live price history, BSR trends, profit margins, and a buy/no-buy verdict in seconds. Built for FBA wholesale sellers." />
    <meta property="og:image"       content="https://aurix.app/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"    content="Aurix — Amazon FBA Product Research Tool" />

    <!-- Twitter / X -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:site"        content="@aurixapp" />
    <meta name="twitter:title"       content="Aurix | Amazon FBA Product Research Tool" />
    <meta name="twitter:description" content="Paste an Amazon ASIN and get live price history, BSR trends, profit margins, and a buy/no-buy verdict in seconds." />
    <meta name="twitter:image"       content="https://aurix.app/og-image.png" />

    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Aurix",
      "url": "https://aurix.app",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "description": "Aurix is an Amazon FBA product and brand research tool. It analyzes any ASIN using live Keepa data to provide price history, BSR trends, FBA seller counts, profit margins, and a buy/no-buy viability score.",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Live ASIN product lookup via Keepa API",
        "90-day price and BSR history charts",
        "FBA profit calculator with auto referral and fulfillment fees",
        "15-criteria product viability scoring",
        "Brand Intelligence with 11-criteria brand scoring",
        "IP complaint history check",
        "Hazmat and adult category detection",
        "Monthly sales estimate from BSR drops"
      ]
    }
    </script>

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Aurix",
      "url": "https://aurix.app",
      "description": "Amazon FBA product and brand research platform for wholesale and online arbitrage sellers",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "support@aurix.app",
        "contactType": "customer support"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
